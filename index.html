<script>
        // 隠しコマンドの正解（コナミコマンド）
        const secretCode = [
            'ArrowUp', 'ArrowUp', 'ArrowDown', 'ArrowDown', 
            'ArrowLeft', 'ArrowRight', 'ArrowLeft', 'ArrowRight', 
            'b', 'a'
        ];
        let inputSequence = [];

        document.addEventListener('keydown', function(e) {
            // 入力されたキーを配列に追加
            inputSequence.push(e.key);
            
            // 正解の配列の長さ以上にキーが入力されたら、古いものを消す
            if (inputSequence.length > secretCode.length) {
                inputSequence.shift();
            }

            // 配列が一致したかチェック
            if (inputSequence.join(',') === secretCode.join(',')) {
                activateSecretMode();
                inputSequence = []; // 発動後にリセット
            }
        });

        // 隠しコマンド発動時の演出
        function activateSecretMode() {
            // ターミナル風の真っ黒な画面を生成
            const terminal = document.createElement('div');
            terminal.id = 'secret-terminal';
            terminal.style.position = 'fixed';
            terminal.style.top = '0';
            terminal.style.left = '0';
            terminal.style.width = '100vw';
            terminal.style.height = '100vh';
            terminal.style.backgroundColor = 'rgba(0, 0, 0, 0.95)';
            terminal.style.color = '#00ff00'; /* ハッカー風の緑文字 */
            terminal.style.fontFamily = 'monospace';
            terminal.style.padding = '40px';
            terminal.style.fontSize = '1.2rem';
            terminal.style.zIndex = '9999';
            terminal.style.boxSizing = 'border-box';
            document.body.appendChild(terminal);

            // 表示する極秘メッセージ
            const messages = [
                "> Initiating Python environment...",
                "> Loading data models...",
                "> Optimization successful.",
                "> Executing HakuMonkey Protocol...",
                "> 60th Anniversary sequence initiated. 🐒✨",
                "> Welcome to the hidden area."
            ];

            let messageIndex = 0;

            // 1行ずつ文字を打ち込むようなアニメーション
            function typeWriter() {
                if (messageIndex < messages.length) {
                    const line = document.createElement('p');
                    line.style.margin = '10px 0';
                    terminal.appendChild(line);
                    
                    let charIndex = 0;
                    const text = messages[messageIndex];
                    
                    const typing = setInterval(() => {
                        line.textContent += text.charAt(charIndex);
                        charIndex++;
                        if (charIndex === text.length) {
                            clearInterval(typing);
                            messageIndex++;
                            setTimeout(typeWriter, 500); // 次の行までの待機時間
                        }
                    }, 50); // 1文字打つスピード
                } else {
                    // 全て表示し終わったら、画面をクリックで閉じられるようにする
                    const closeInstruction = document.createElement('p');
                    closeInstruction.style.color = '#fff';
                    closeInstruction.style.marginTop = '40px';
                    closeInstruction.style.cursor = 'pointer';
                    closeInstruction.textContent = "[Click anywhere to close terminal]";
                    terminal.appendChild(closeInstruction);
                    
                    terminal.addEventListener('click', () => {
                        terminal.style.transition = 'opacity 0.5s';
                        terminal.style.opacity = '0';
                        setTimeout(() => terminal.remove(), 500);
                    });
                }
            }

            // アニメーション開始
            typeWriter();
        }
    </script>
